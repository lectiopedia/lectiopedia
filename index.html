<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LECTIO</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cinzel',serif;
background:#0f1720;
color:white;
text-align:center;
overflow-x:hidden;

/* espacio para el menú lateral */
padding-left:180px;

}

/* FONDO LIBROS */

.libroFondo{
position:fixed;
font-size:28px;
opacity:0.07;
animation:caer linear infinite;
}

@keyframes caer{
0%{transform:translateY(-100px)}
100%{transform:translateY(120vh)}
}

/* MENU LATERAL */

.menuCatalogos{
position:fixed;
left:0;
top:150px;
width:160px;
background:#111827;
padding:20px;
border-right:3px solid #d4af37;
z-index:100;
}

.menuCatalogos button{
display:block;
margin:10px 0;
padding:10px;
background:#d4af37;
border:none;
cursor:pointer;
font-weight:bold;
}

/* PORTADA */

.portada{
padding:80px 20px;
background:linear-gradient(#0f1720,#1b263b);
}

.logo{
font-size:70px;
color:#d4af37;
text-shadow:0 0 20px #d4af37;
animation:logoAnim 4s infinite alternate;
}

@keyframes logoAnim{
from{letter-spacing:5px}
to{letter-spacing:18px}
}

.sub{
font-size:22px;
margin-top:10px;
opacity:0.9;
animation:flotar 3s infinite alternate;
}

@keyframes flotar{
from{transform:translateY(0)}
to{transform:translateY(-10px)}
}

/* BUSCADOR */

#buscador{
margin-top:30px;
padding:15px;
width:330px;
border-radius:10px;
border:2px solid #d4af37;
background:#111827;
color:white;
font-size:16px;
}

/* REDES */

.redes{
margin-top:20px;
}

.redes a{
margin:10px;
color:white;
text-decoration:none;
padding:10px 20px;
border:2px solid #d4af37;
border-radius:6px;
}

/* OFERTAS */

.ofertas{
margin-top:60px;
padding:40px;
background:#111827;
}

.ofertas h2{
color:#d4af37;
font-size:40px;
}

.contenedorOfertas{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
margin-top:40px;
}

.oferta{
background:#1f2937;
padding:30px;
width:300px;
border:2px solid #d4af37;
border-radius:10px;
}

.oferta h3{
color:#d4af37;
}

.precioAnterior{
text-decoration:line-through;
color:#aaa;
}

.precio{
font-size:35px;
color:#00ffae;
margin-top:10px;
}

.contador{
font-size:20px;
color:#ff6b6b;
margin-top:10px;
}

.personas{
margin-top:10px;
color:#ccc;
}

.botonComprar{
margin-top:20px;
padding:12px 20px;
background:#d4af37;
border:none;
color:black;
font-weight:bold;
cursor:pointer;
}

/* CATALOGOS */

.catalogos{
padding:70px 20px;
}

.catalogoGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
max-width:700px;
margin:auto;
margin-top:20px;
}

.catalogoGrid button{
padding:12px 18px;
background:#d4af37;
border:none;
cursor:pointer;
font-weight:bold;
}

/* INVERTIR */

.invertir{
background:#111827;
padding:60px;
}

.invertir h2{
color:#d4af37;
}

/* FAQ */

.faq{
padding:60px;
}

.faq h2{
color:#d4af37;
}

.pregunta{
margin-top:20px;
font-weight:bold;
}

.respuesta{
opacity:0.85;
}

</style>

</head>

<body>

<!-- LIBROS FONDO -->

<div class="libroFondo" style="left:10%;animation-duration:12s">📚</div>
<div class="libroFondo" style="left:40%;animation-duration:16s">📖</div>
<div class="libroFondo" style="left:70%;animation-duration:10s">📚</div>
<div class="libroFondo" style="left:90%;animation-duration:14s">📖</div>

<!-- MENU CATALOGOS -->

<div class="menuCatalogos">

<h3>Catálogos</h3>

<button onclick="pedirCatalogo('psicologia')">Psicología</button>
<button onclick="pedirCatalogo('habitos')">Hábitos</button>
<button onclick="pedirCatalogo('ventas')">Ventas</button>
<button onclick="pedirCatalogo('marketing')">Marketing</button>
<button onclick="pedirCatalogo('audiolibros')">Audiolibros</button>

</div>

<!-- el resto del código sigue exactamente igual -->
