<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Biblioteca Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0e0e0e;
color:white;
font-family:'Inter',sans-serif;
}

/* TITULO */

header{
text-align:center;
padding:40px;
}

h1{
font-family:'Cinzel',serif;
font-size:48px;
letter-spacing:4px;
margin-bottom:10px;
}

/* BUSCADOR */

.buscador{
text-align:center;
margin-bottom:40px;
}

input{
width:60%;
padding:12px;
font-size:16px;
border:none;
border-radius:6px;
}

/* CATEGORIAS */

.categorias{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.categoria{
background:#1c1c1c;
padding:20px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.categoria:hover{
background:#292929;
transform:scale(1.05);
}

.categoria h2{
font-family:'Cinzel',serif;
font-size:20px;
margin:0;
}

/* LIBROS */

#libros{
padding:40px;
}

.libro{
padding:8px 0;
border-bottom:1px solid #333;
}

</style>

</head>

<body>

<header>

<h1>BIBLIOTECA DIGITAL</h1>

</header>


<div class="buscador">

<input type="text" id="buscar" placeholder="Buscar libro...">

</div>


<div class="categorias" id="categorias"></div>


<div id="libros"></div>



<script>

/* LISTA DE CATEGORIAS */

const categorias = [

"habitos_productividad",
"autoayuda_liderazgo",
"filosofia",
"historia_griega_clasica",
"brian_tracy",
"libros_biblicos",
"clasicos",
"robert_kiyosaki",
"trading_forex_mercado",
"inteligencia_emocional",
"anthony_robbins",
"recetas_diabetes",
"aprende_sobre_dinero",
"crea_habitos_inquebrantables",
"adolescentes",
"best_sellers_modernos",
"historia_america_latina",
"ciencia",
"cuentos_disney",
"recetas_veganas",
"divulgacion_cientifica",
"dummies_domina_tu_materia",
"esenciales_clasicos",
"conviertete_en_el_mejor_fotografo",
"grafologia"

]

/* MOSTRAR CATEGORIAS */

const contenedor = document.getElementById("categorias")

categorias.forEach(cat=>{

let div=document.createElement("div")

div.className="categoria"

div.innerHTML="<h2>"+cat.replaceAll("_"," ")+"</h2>"

div.onclick=()=>cargarCategoria(cat)

contenedor.appendChild(div)

})


/* CARGAR LIBROS */

async function cargarCategoria(nombre){

let res=await fetch("categorias/"+nombre+".json")

let data=await res.json()

let cont=document.getElementById("libros")

cont.innerHTML="<h2>"+data.categoria+"</h2>"

data.libros.forEach(libro=>{

let div=document.createElement("div")

div.className="libro"

div.textContent=libro

cont.appendChild(div)

})

}


/* BUSCADOR */

document.getElementById("buscar").addEventListener("keyup",function(){

let texto=this.value.toLowerCase()

let libros=document.querySelectorAll(".libro")

libros.forEach(libro=>{

libro.style.display=libro.textContent.toLowerCase().includes(texto) ? "block" : "none"

})

})

</script>

</body>
</html>
