<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LECTIO</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:'Cinzel',serif;
background:#0f1720;
color:white;
text-align:center;
overflow-x:hidden;
}

/* FONDO ANIMADO */

body::before{
content:"📚 🧠 ⚡ 📖 📚 ⚡ 🧠";
position:fixed;
font-size:50px;
opacity:0.05;
animation:fondo 60s linear infinite;
}

@keyframes fondo{
from{transform:translateX(-100%)}
to{transform:translateX(100%)}
}

/* MENU LATERAL */

.menuLateral{
position:fixed;
left:0;
top:120px;
background:#111827;
padding:20px;
border-right:2px solid #d4af37;
}

.menuLateral button{
display:block;
margin:10px 0;
padding:8px;
background:#d4af37;
border:none;
cursor:pointer;
}

/* PORTADA */

.portada{
padding:80px 20px;
}

.templo{
font-size:60px;
animation:aparecer 2s;
}

.logo{
font-size:70px;
color:#d4af37;
text-shadow:0 0 20px #d4af37;
animation:logoAnim 2s;
}

@keyframes logoAnim{
0%{opacity:0;letter-spacing:30px}
100%{opacity:1;letter-spacing:5px}
}

.sub{
font-size:22px;
animation:flotar 3s infinite alternate;
}

@keyframes flotar{
from{transform:translateY(0)}
to{transform:translateY(-10px)}
}

/* BUSCADOR */

#buscador{
padding:15px;
width:300px;
border-radius:8px;
border:none;
margin-top:20px;
}

/* REDES */

.redes i{
font-size:28px;
margin:10px;
color:white;
}

/* CARRITO */

.carritoIcono{
position:fixed;
top:20px;
right:20px;
background:#d4af37;
color:black;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

.carritoPanel{
position:fixed;
right:-350px;
top:0;
width:350px;
height:100%;
background:#111827;
padding:20px;
transition:0.4s;
}

.carritoPanel.activo{
right:0;
}

/* LIBROS */

.catalogo{
padding:60px;
}

.libros{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.libro{
background:#1f2937;
padding:20px;
width:200px;
border:2px solid #d4af37;
border-radius:10px;
}

.libro button{
margin-top:10px;
padding:10px;
background:#d4af37;
border:none;
cursor:pointer;
}

/* OFERTAS */

.ofertas{
background:#111827;
padding:40px;
}

.precioAnterior{
text-decoration:line-through;
}

.precio{
color:#00ffae;
font-size:30px;
}

/* NOTIFICACIONES */

.notificacion{
position:fixed;
bottom:20px;
left:20px;
background:#111827;
border:1px solid #d4af37;
padding:15px;
display:none;
}

</style>

</head>

<body>

<div class="menuLateral">

<h3>Categorías</h3>

<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('psicologia')">Psicología</button>
<button onclick="filtrar('negocios')">Negocios</button>
<button onclick="filtrar('seduccion')">Seducción</button>
<button onclick="filtrar('desarrollo')">Desarrollo</button>

</div>

<div class="carritoIcono" onclick="abrirCarrito()">
🛒 <span id="contadorCarrito">0</span>
</div>

<div id="carritoPanel" class="carritoPanel">

<h2>Tu carrito</h2>

<div id="itemsCarrito"></div>

<p id="totalCarrito">Total: $0</p>

<button onclick="comprarWhatsApp()">
Comprar por WhatsApp
</button>

</div>

<section class="portada">

<div class="templo">🏛</div>

<div class="logo">LECTIO</div>

<div class="sub">
DESCUBRE QUIÉN ERES REALMENTE
</div>

<input id="buscador" placeholder="Buscar libros">

<div class="redes">

<a href="https://instagram.com/lectio.pedia" target="_blank">
<i class="fab fa-instagram"></i>
</a>

<a href="https://wa.me/543515101643" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

</div>

</section>

<section class="ofertas">

<h2>ACCESO COMPLETO A LA BIBLIOTECA</h2>

<p class="precioAnterior">$120000</p>

<p class="precio">$25000</p>

<p>Incluye miles de libros + audiolibros + película El Lobo de Wall Street</p>

<div id="contador"></div>

<div id="personas"></div>

</section>

<section class="catalogo">

<h2>CATÁLOGO</h2>

<div id="contenedorLibros" class="libros"></div>

</section>

<div id="notificacion" class="notificacion"></div>

<script>

/* CONTADOR */

let tiempo=7200

setInterval(()=>{

let h=Math.floor(tiempo/3600)
let m=Math.floor((tiempo%3600)/60)
let s=tiempo%60

document.getElementById("contador").innerText=
"Oferta termina en "+h+":"+m+":"+s

tiempo--

},1000)

/* PERSONAS */

setInterval(()=>{

let n=Math.floor(Math.random()*25)+15

document.getElementById("personas").innerText=
n+" personas viendo esta oferta"

},4000)

/* CARRITO */

let carrito=[]

function abrirCarrito(){
document.getElementById("carritoPanel").classList.toggle("activo")
}

function agregar(nombre,precio){

carrito.push({nombre,precio})

actualizar()

}

function eliminar(i){

carrito.splice(i,1)

actualizar()

}

function actualizar(){

let cont=document.getElementById("itemsCarrito")

cont.innerHTML=""

let total=0

carrito.forEach((item,i)=>{

let div=document.createElement("div")

div.innerHTML=item.nombre+" $"+item.precio+
" <span onclick='eliminar("+i+")'>❌</span>"

cont.appendChild(div)

total+=item.precio

})

document.getElementById("contadorCarrito").innerText=carrito.length
document.getElementById("totalCarrito").innerText="Total: $"+total

}

function comprarWhatsApp(){

let mensaje="Hola quiero comprar:%0A"

carrito.forEach(item=>{
mensaje+=item.nombre+"%0A"
})

window.open("https://wa.me/543515101643?text="+encodeURIComponent(mensaje))

}

/* BUSCADOR */

document.getElementById("buscador").addEventListener("keyup",function(){

let f=this.value.toLowerCase()

document.querySelectorAll(".libro").forEach(libro=>{

let t=libro.innerText.toLowerCase()

libro.style.display=t.includes(f)?"block":"none"

})

})

/* GENERAR 1000 LIBROS */

let categorias=["psicologia","negocios","seduccion","desarrollo"]

let contenedor=document.getElementById("contenedorLibros")

categorias.forEach(cat=>{

for(let i=1;i<=250;i++){

let div=document.createElement("div")

div.className="libro"

div.dataset.cat=cat

div.innerHTML=`
${cat} libro ${i}
<br>
<button onclick="agregar('${cat} libro ${i}',3900)">
Agregar al carrito
</button>
`

contenedor.appendChild(div)

}

})

/* FILTRO */

function filtrar(cat){

document.querySelectorAll(".libro").forEach(libro=>{

if(cat==="todos"){
libro.style.display="block"
return
}

libro.style.display=libro.dataset.cat===cat?"block":"none"

})

}

/* NOTIFICACIONES */

let nombres=["Juan","Maria","Carlos","Lucia"]

let ciudades=["Córdoba","Buenos Aires","Rosario"]

setInterval(()=>{

let n=nombres[Math.floor(Math.random()*nombres.length)]
let c=ciudades[Math.floor(Math.random()*ciudades.length)]

let box=document.getElementById("notificacion")

box.innerText=n+" de "+c+" compró un libro"

box.style.display="block"

setTimeout(()=>box.style.display="none",4000)

},15000)

</script>

</body>
</html>
